<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="form0410.css" />
  </head>
  <body>
    <main class="big-bg">
      <section class="st1">
        <h1 style="font-size: 32px; font-weight: 400">F2E02表單練習</h1>
        <div class="fproblems">
          <p>僅供新尖兵 F2E02 表單切版練習作業</p>
          <hr />
          <a href="">登入 Google</a>
          <span>即可儲存進度。</span>
          <a href="">瞭解詳情</a>
          <hr />
          <p color="red"><span>*</span>表示必填問題</p>
        </div>
      </section>
      <form action="">
        <section class="st2">
          <div class="fproblems">
            <form action="">
              姓名<span>*</span>
              <div>
                <input type="text" placeholder="你的回答" />
              </div>
            </form>
          </div>
        </section>
        <section class="st4">
          <div class="fproblems">信箱<span>*</span></div>
          <div class="mail">
            <input type="text" name="email" placeholder="你的回答" />
          </div>
        </section>
        <section class="st3">
          <div class="fproblems">生日</div>
          <p class="p-data">日期</p>
          <div class="">
            <input type="date" name="" />
          </div>
        </section>
        <section class="st5">
          <div class="fproblems">想跟老師說悄悄話</div>
          <div class="talk">
            <input type="text" name="talk-in" placeholder="你的回答" />
          </div>
        </section>
        <section class="st6">
          <div class="fproblems">喜歡的顏色</div>
          <div>
            <label for="">
              黃<input type="radio" name="color-in" id="" /> </label
            ><br />
            <label for="">綠<input type="radio" name="color-in" id="" /> </label
            ><br />
            <label for=""> 藍<input type="radio" name="color-in" /> </label>
          </div>
        </section>
        <section class="st7">
          <div class="fproblems">喜歡吃的飲食類型</div>
          <label for=""><input type="checkbox" name="eat" />中式<br /></label>
          <label for=""><input type="checkbox" name="eat" />義式<br /></label>
          <label for=""><input type="checkbox" name="eat" />韓式<br /></label>
          <label for=""><input type="checkbox" name="eat" />日式<br /></label>
          <label for=""><input type="checkbox" name="eat" />美式<br /></label>
          <label for=""><input type="checkbox" name="eat" />泰式<br /></label>
        </section>
        <section class="st8">
          <div class="country-block">
            最想去的國家 (使用 optgroup 將選項分為不同洲)
          </div>
          <div>
            <label for="country">
              <select name="goto" id="country">
                <option value="">選擇</option>
                <option value="japan">日本</option>
                <option value="korea">韓國</option>
                <option value="thailand">泰國</option>
                <option value="germany">德國</option>
                <option value="uk">英國</option>
                <option value="canada">加拿大</option>
                <option value="usa">美國</option>
              </select>
            </label>
          </div>
        </section>
        <div class="st9">
          <button type="submit" class="submit-btn">提交</button>
          <a href="#" class="clear">清除表單</a>
        </div>
      </form>
      <div class="stop">請勿利用 Google 表單送出密碼。</div>
      <p class="p-text">
        這份表單是在 五倍紅寶石程式資訊教育股份有限公司 中建立。 -
        聯絡表單擁有者
      </p>
      <p class="p-text">這份表單很可疑嗎？ 報告</p>
    </main>
  </body>
</html>
